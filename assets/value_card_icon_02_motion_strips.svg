<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Designed edits motion strips icon">

  <defs>
    <radialGradient id="tealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2EF7EA" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#1CDAD0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#1CDAD0" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C75B" stop-opacity="0.75"/>
      <stop offset="52%" stop-color="#D9AE3B" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#D9AE3B" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="tealStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2EF7EA" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#1FB9B4" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#E8C75B" stop-opacity="0.72"/>
    </linearGradient>

    <linearGradient id="softGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2EF7EA" stop-opacity="0.22"/>
      <stop offset="48%" stop-color="#2EF7EA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E8C75B" stop-opacity="0.18"/>
    </linearGradient>

    <filter id="blurGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.12
                0 0 0 0 0.96
                0 0 0 0 0.90
                0 0 0 0.55 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="goldBlur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.90
                0 0 0 0 0.72
                0 0 0 0 0.24
                0 0 0 0.48 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="none"/>

  <!-- ambient glows -->
  <ellipse cx="285" cy="248" rx="172" ry="132" fill="url(#tealGlow)" opacity="0.22" transform="rotate(-24 285 248)"/>
  <ellipse cx="308" cy="272" rx="130" ry="84" fill="url(#goldGlow)" opacity="0.16" transform="rotate(-24 308 272)"/>

  <!-- diagonal motion strips -->
  <g transform="rotate(-26 256 256)" filter="url(#softShadow)">
    <rect x="145" y="132" width="268" height="58" rx="14" fill="url(#softGlass)" stroke="#2EF7EA" stroke-opacity="0.24"/>
    <rect x="105" y="224" width="304" height="62" rx="14" fill="url(#softGlass)" stroke="#2EF7EA" stroke-opacity="0.24"/>
    <rect x="158" y="318" width="236" height="54" rx="13" fill="url(#softGlass)" stroke="#2EF7EA" stroke-opacity="0.20"/>

    <!-- inner highlights -->
    <rect x="166" y="143" width="164" height="10" rx="5" fill="#BFFDF8" opacity="0.22"/>
    <rect x="128" y="236" width="166" height="10" rx="5" fill="#E8C75B" opacity="0.36"/>
    <rect x="182" y="329" width="120" height="9" rx="4.5" fill="#BFFDF8" opacity="0.18"/>
  </g>

  <!-- trail lines -->
  <g stroke="#2EF7EA" stroke-opacity="0.22" stroke-width="2" stroke-linecap="round" transform="rotate(-26 256 256)">
    <path d="M62 206H132"/>
    <path d="M78 298H126"/>
    <path d="M372 214H446"/>
    <path d="M342 306H430"/>
  </g>

  <!-- central warm accent strip -->
  <g transform="rotate(-26 256 256)" filter="url(#goldBlur)">
    <rect x="214" y="235" width="134" height="34" rx="9" fill="#E8C75B" opacity="0.40"/>
  </g>
</svg>
